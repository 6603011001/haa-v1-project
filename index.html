<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:sans-serif; }

#chatApp {
    height:100vh;
    display:flex;
    flex-direction:column;
    background:#0f172a;
    color:white;
}

#header {
    padding:15px;
    background:#020617;
}

#messages {
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.msg {
    padding:10px;
    margin:5px;
    border-radius:15px;
    max-width:70%;
}

.user { background:#38bdf8; margin-left:auto; }
.ai { background:#334155; }

#inputArea {
    display:flex;
    padding:10px;
    background:#020617;
}

#input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
}

button {
    margin-left:5px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
}
</style>
</head>

<body>

<div id="chatApp">
    <div id="header">❤️ AI ที่เข้าใจหัวใจคุณ</div>
    <div id="messages"></div>

    <div id="inputArea">
        <input id="input" placeholder="พิมพ์หรือพูด..." />
        <button onclick="sendMessage()">ส่ง</button>
        <button onclick="startListening()">🎤</button>
    </div>
</div>

<script>
const API_URL = "https://ai-love-backend.onrender.com";
    
document.getElementById("input").addEventListener("keypress", e=>{
    if(e.key==="Enter") sendMessage();
});

function addMessage(text,type){
    let div=document.createElement("div");
    div.className="msg "+type;
    div.innerText=text;
    messages.appendChild(div);
    messages.scrollTop=messages.scrollHeight;

    if(type==="ai") speak(text);
}

async function sendMessage(){
    let input=document.getElementById("input");
    let msg=input.value.trim();
    if(!msg) return;

    addMessage(msg,"user");
    input.value="";

    let res=await fetch(API_URL+"/chat",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({message:msg})
    });

    let data=await res.json();
    addMessage(data.content,"ai");
}

// 🎤 Speech to Text
function startListening(){
    const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
    rec.lang="th-TH";
    rec.start();

    rec.onresult=e=>{
        let text=e.results[0][0].transcript;
        document.getElementById("input").value=text;
        sendMessage();
    };
}

// 🔊 Text to Speech
function speak(text){
    let speech=new SpeechSynthesisUtterance(text);
    speech.lang="th-TH";
    window.speechSynthesis.speak(speech);
}

// โหลด history
async function loadHistory(){
    let res=await fetch(API_URL+"/history");
    let data=await res.json();

    data.forEach(chat=>{
        addMessage(chat.user,"user");
        addMessage(chat.ai,"ai");
    });
}
loadHistory();
</script>

</body>
</html>
