<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family:sans-serif;
}

/* แชทเต็มจอ */
#chatApp {
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    background:#0f172a;
    color:white;
}

/* Header */
#header {
    padding:15px;
    background:#020617;
    font-size:18px;
}

/* ข้อความ */
#messages {
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.msg {
    padding:10px;
    margin:5px;
    border-radius:15px;
    max-width:70%;
}

.user {
    background:#38bdf8;
    margin-left:auto;
}

.ai {
    background:#334155;
}

/* typing */
.typing {
    font-size:12px;
    opacity:0.7;
}

/* input */
#inputArea {
    display:flex;
    padding:10px;
    background:#020617;
}

#input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
    outline:none;
}

button {
    margin-left:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="chatApp">

    <div id="header">❤️ AI ที่เข้าใจหัวใจคุณ</div>

    <div id="messages"></div>

    <div id="typing" class="typing"></div>

    <div id="inputArea">
        <input id="input" placeholder="พิมพ์ความรู้สึกของคุณ..." />
        <button onclick="sendMessage()">ส่ง</button>
    </div>

</div>

<script>
let memory = [];

document.getElementById("input").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});

function sendMessage(){
    let input = document.getElementById("input");
    let msg = input.value.trim();
    if(msg === "") return;

    addMessage(msg,"user");
    memory.push(msg);
    input.value="";

    showTyping(true);

    setTimeout(()=>{
        let reply = smartAI(msg);
        showTyping(false);
        addMessage(reply,"ai");
        memory.push(reply);
    },1000);
}

function addMessage(text,type){
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    let messages = document.getElementById("messages");
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

// typing effect
function showTyping(show){
    let t = document.getElementById("typing");
    t.innerText = show ? "AI กำลังพิมพ์..." : "";
}

// วิเคราะห์อารมณ์
function analyze(msg){
    msg = msg.toLowerCase();
    if(msg.includes("อกหัก")||msg.includes("เสียใจ")) return "sad";
    if(msg.includes("เหงา")) return "lonely";
    if(msg.includes("รัก")) return "love";
    return "normal";
}

// AI ตอบ
function smartAI(msg){
    let emo = analyze(msg);
    let last = memory[memory.length-2]||"";

    if(emo==="sad"){
        return "เรารู้ว่ามันเจ็บนะ... แต่คุณไม่ได้อยู่คนเดียว ❤️";
    }
    if(emo==="lonely"){
        return "ถ้าคุณเหงา เราอยู่ตรงนี้นะ 🫂";
    }
    if(emo==="love"){
        return "ความรักมันสวยงามนะ แล้วเขาทำให้คุณรู้สึกยังไงบ้าง 😊";
    }

    if(last.includes("อกหัก")){
        return "ยังคิดถึงเขาอยู่ใช่ไหม... มันปกตินะ 💔";
    }

    return "เล่าให้เราฟังเพิ่มได้ไหม เราอยากเข้าใจคุณ ❤️";
}
</script>

</body>
</html>
