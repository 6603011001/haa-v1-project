<!-- ❤️ AI Chat -->
<div id="chatBox">
    <div id="messages"></div>
    <input type="text" id="input" placeholder="พิมพ์เรื่องหัวใจของคุณ..." />
    <button onclick="sendMessage()">ส่ง</button>
</div>

<style>
#chatBox {
    position:fixed;
    bottom:20px;
    right:20px;
    width:300px;
    background:#1e293b;
    padding:10px;
    border-radius:15px;
}

#messages {
    height:200px;
    overflow-y:auto;
    margin-bottom:10px;
}

.msg {
    padding:8px;
    margin:5px;
    border-radius:10px;
}

.user {
    background:#38bdf8;
    text-align:right;
}

.ai {
    background:#334155;
}
</style>

<script>
function sendMessage(){
    let input = document.getElementById("input");
    let msg = input.value;
    if(msg === "") return;

    addMessage(msg, "user");
    input.value = "";

    setTimeout(()=>{
        let reply = getAIResponse(msg);
        addMessage(reply, "ai");
    },500);
}

function addMessage(text, type){
    let messages = document.getElementById("messages");
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

// ❤️ AI logic (เรื่องหัวใจ)
function getAIResponse(msg){
    msg = msg.toLowerCase();

    if(msg.includes("รัก")){
        return "ความรักมันสวยงามนะ แต่ก็ต้องดูแลหัวใจตัวเองด้วย ❤️";
    }
    if(msg.includes("อกหัก")){
        return "การอกหักมันเจ็บ แต่ก็เป็นส่วนหนึ่งของการเติบโตนะ 💔";
    }
    if(msg.includes("คิดถึง")){
        return "บางครั้งการคิดถึงใครสักคน แปลว่าเขาสำคัญมากจริง ๆ 🥺";
    }
    if(msg.includes("เหงา")){
        return "คุณไม่ได้อยู่คนเดียวเสมอไปนะ ยังมีเราอยู่ตรงนี้ ❤️";
    }

    return "เล่าให้ฟังเพิ่มได้ไหม เราอยากเข้าใจหัวใจของคุณมากขึ้น ❤️";
}
</script>
